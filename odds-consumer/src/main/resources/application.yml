server:
  port: 8080

spring:
  application:
    name: odds-consumer
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # PROBLEM 5: Only 1 consumer - bottleneck!
        concurrency: 1
        # PROBLEM 6: Fetches too many messages - memory issues
        prefetch: 1000

app:
  rabbitmq:
    queue-name: odds-changes.queue
    exchange-name: odds-changes.exchange
    routing-key: odds.change
  external-api:
    base-url: http://localhost:8082/api/validator
